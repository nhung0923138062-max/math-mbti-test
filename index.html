<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中数学做题人精神状态测试</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        :root { --primary: #1e293b; --bg: #eef2f6; --accent: #3b82f6; --card-bg: #ffffff; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; margin: 0; display: flex; justify-content: center; color: #333; }
        .container { max-width: 500px; width: 100%; margin-top: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); margin-bottom: 20px; position: relative; overflow: hidden; }
        .q-number { display: inline-block; background: #e0e7ff; color: var(--accent); font-weight: bold; padding: 4px 12px; border-radius: 12px; margin-right: 10px; font-size: 0.9rem; }
        .q-text { font-size: 1.15rem; line-height: 1.6; margin: 15px 0 25px 0; font-weight: 600; }
        .option { border: 2px solid #f1f5f9; border-radius: 16px; padding: 16px; margin-bottom: 15px; cursor: pointer; transition: all 0.2s; display: flex; align-items: flex-start; }
        .option:hover { border-color: #bfdbfe; background: #f8fafc; transform: translateY(-1px); }
        .option-letter { font-weight: 900; color: #94a3b8; width: 24px; font-size: 1rem; margin-right: 10px; margin-top: 2px; }
        .option-content { flex: 1; line-height: 1.5; color: #475569; }
        #result-view { display: none; text-align: center; }
        .radar-box { margin: 20px auto; width: 100%; max-width: 300px; }
        .btn { width: 100%; padding: 15px; border-radius: 14px; border: none; background: var(--accent); color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .progress-wrap { display: flex; justify-content: center; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
        .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; }
        .progress-dot.active { background: var(--accent); }
        
        /* 签名样式 */
        .footer {
            text-align: center;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 40px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-family: "STKaiti", "KaiTi", serif;
        }

        .katex { font-size: 1.05em; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-view">
        <div class="progress-wrap" id="progress-dots"></div>
        <div class="card" id="q-card">
            <div style="text-align: center; padding: 30px; color: #64748b;">
                试卷印刷中... (加载公式引擎)
            </div>
        </div>
    </div>

    <div id="result-view" class="card">
        <div style="font-size: 0.9rem; color: #64748b; font-weight: bold; margin-bottom: 10px;">你的做题人成分是...</div>
        <h2 id="persona-title" style="color: var(--accent); margin: 0 0 15px 0; font-size: 1.8rem;"></h2>
        <div class="radar-box" id="radar-chart"></div>
        <div id="persona-desc" style="line-height: 1.7; text-align: left; color: #475569; font-size: 0.95rem;"></div>
        <button class="btn" onclick="location.reload()">再测一次</button>
    </div>

    <div class="footer">—— Designed by 雯 ——</div>
</div>

<script>
    const questions = [
        {
            t: '导数压轴题第二问，要证 $x_1+x_2>2x_0$，式子长得像你祖宗，你心里想：',
            opts: [
                { l: 'A', c: '对称构造法 $F(x)=f(x)-f(2x_0-x)$，主打一个教科书般的优雅', w: 'elegant' },
                { l: 'B', c: '对数平均不等式直接拍上去！管它扣不扣步骤分，先爽了再说', w: 'intuition' },
                { l: 'C', c: '画个草图看凸凹性，只要图画得够准，直觉告诉我这题稳了', w: 'visual' },
                { l: 'D', c: '换元大法好！把 $x_1/x_2$ 设成 $t$，硬算单调性，看谁先死', w: 'brute' }
            ]
        },
        {
            t: '解析几何，动点乱飞，遇到个逆天不对称式 $ax_1^2 + bx_2^2$，此时距离交卷还有20分钟：',
            opts: [
                { l: 'A', c: '强行韦达定理！联立、展开，草稿纸写满，看阅卷老师先晕还是我先晕', w: 'brute' },
                { l: 'B', c: '齐次化启动！或者掏出曲线系方程装个大的', w: 'elegant' },
                { l: 'C', c: '极坐标系！用焦半径公式绕过直角坐标系的折磨', w: 'visual' },
                { l: 'D', c: '看看能不能把点挪到长短轴端点上，拿特例看一眼答案长啥样', w: 'intuition' }
            ]
        },
        {
            t: '立体几何求二面角，图形画得跟被核弹炸过一样，根本找不到垂直关系：',
            opts: [
                { l: 'A', c: '找他喵的三垂线定理！在脑子里疯狂旋转这个破图形', w: 'visual' },
                { l: 'B', c: '不管三七二十一，建系！法向量一叉乘，全是无情的机器运算', w: 'brute' },
                { l: 'C', c: '补形大法好，看能不能强行把它塞进一个正方体里', w: 'elegant' },
                { l: 'D', c: '用尺子量（不是），直接猜特殊角 $60^\\circ$ 或 $90^\\circ$ 往回倒推', w: 'intuition' }
            ]
        },
        {
            t: '遇到抽象函数 $f(x+2) + f(x) = 0$ 求大数值 $f(2025)$：',
            opts: [
                { l: 'A', c: '老老实实令 $x=1, x=2...$ 一步一步代入推周期，不嫌累', w: 'brute' },
                { l: 'B', c: '翻译成周期 $T=4$ 以及对称中心，画出草图直接看', w: 'visual' },
                { l: 'C', c: '脑补一个满足条件的具体实体函数，比如 $\\sin(\\frac{\\pi}{2}x)$ 代进去秒了', w: 'intuition' },
                { l: 'D', c: '利用差分方程的特征根思想，从高维视角降维打击', w: 'elegant' }
            ]
        },
        {
            t: '概率大题，摸球规则比双十一满减还复杂，求期望步数：',
            opts: [
                { l: 'A', c: '画个树状图，把前几种情况死磕出来，肉眼找规律', w: 'visual' },
                { l: 'B', c: '设个 $E$，列一堆全概率递推方程组，疯狂解方程', w: 'brute' },
                { l: 'C', c: '看透它是吸收态马尔可夫链的本质，矩阵运算在心里默默开启', w: 'elegant' },
                { l: 'D', c: '赌出题人不敢出太变态的数字，算几个简单情况直接猜个整数', w: 'intuition' }
            ]
        },
        {
            t: '三角函数化简，满眼都是 $\\sin^3 x$ 和 $\\cos 2x$ 在群魔乱舞：',
            opts: [
                { l: 'A', c: '万能公式、降幂扩角，像无情的碎纸机一样一路推平', w: 'brute' },
                { l: 'B', c: '敏锐捕捉齐次式的气味，上下同除 $\\cos^2 x$ 变 $\\tan$ 构造闭环', w: 'elegant' },
                { l: 'C', c: '把 $x$ 脑补成单位圆上的点，化成斜率或者截距最值问题', w: 'visual' },
                { l: 'D', c: '特值法万岁！代入 $x=0, \\pi/4$，两秒钟选出选择题答案', w: 'intuition' }
            ]
        },
        {
            t: '数列裂项相消，分母长得像一坨乱码 $a_n a_{n+1} a_{n+2}$：',
            opts: [
                { l: 'A', c: '强行设 $\\frac{A}{n} + \\frac{B}{n+1}$，待定系数法就是我的神', w: 'brute' },
                { l: 'B', c: '洞察到它其实是某个离散函数的差分形式 $f(n)-f(n+1)$', w: 'elegant' },
                { l: 'C', c: '算出前三项求和！分子分母一约，剩下的全靠直觉猜通项', w: 'intuition' },
                { l: 'D', c: '把 $a_n$ 看作坐标，画出散点图猜它的收敛极限', w: 'visual' }
            ]
        },
        {
            t: '平面向量数量积求最值，点在圆或椭圆上乱跑：',
            opts: [
                { l: 'A', c: '建系！全他喵的变成三角函数或者参数方程求导', w: 'brute' },
                { l: 'B', c: '极化恒等式启动！变成中线平方减一半底边平方，舒服了', w: 'elegant' },
                { l: 'C', c: '投影法！把一个向量投影到另一个上，靠肉眼看哪里最长', w: 'visual' },
                { l: 'D', c: '极值肯定在长短轴端点或者切线处，直接代这几个特殊点', w: 'intuition' }
            ]
        },
        {
            t: '选择题压轴，逆天三元不等式 $x+y+z=1$ 求 $\\frac{1}{x} + \\frac{1}{y} + \\frac{1}{z}$ 极值：',
            opts: [
                { l: 'A', c: '柯西不等式！均值定理！配凑系数主打一个艺术体操', w: 'elegant' },
                { l: 'B', c: '暴力消元，变成二元函数求偏导，算到手抽筋', w: 'brute' },
                { l: 'C', c: '直接令 $x=y=z=1/3$，这题九成是取等号的时候', w: 'intuition' },
                { l: 'D', c: '看作空间坐标系里平面被切的截距，找法向量方向', w: 'visual' }
            ]
        },
        {
            t: '遇到含有 $e^x$ 和 $\\ln x$ 的变态超越方程，解不出零点：',
            opts: [
                { l: 'A', c: '隐零点设出来！$f(x_0)=0$ 强行代换，硬做单调性', w: 'brute' },
                { l: 'B', c: '同构！把式子左右两边凑成一模一样的结构，脱去外壳', w: 'elegant' },
                { l: 'C', c: '画两个函数的图，看它们的切线和交点走势，肉眼估算', w: 'visual' },
                { l: 'D', c: '泰勒展开！$e^x \\approx 1+x$，洛必达！大招全交管它扣不扣分', w: 'intuition' }
            ]
        },
        {
            t: '证明解析几何里的直线过定点：',
            opts: [
                { l: 'A', c: '设直线方程，联立曲线，韦达定理十字相乘狂暴展开', w: 'brute' },
                { l: 'B', c: '掏出极点极线理论或者仿射变换，从更高维度秒杀', w: 'elegant' },
                { l: 'C', c: '让动点跑到极限位置（比如长短轴端点），一眼看穿定点在哪', w: 'intuition' },
                { l: 'D', c: '画几根不同位置的弦，看它们交在哪，然后倒推', w: 'visual' }
            ]
        },
        {
            t: '复数题到了最后几步，求模长 $|z-2i|$ 的最大值：',
            opts: [
                { l: 'A', c: '设 $z=x+yi$，展开成关于 $x, y$ 的二元函数硬求', w: 'brute' },
                { l: 'B', c: '掏出三角不等式 $|z_1+z_2| \\le |z_1|+|z_2|$ 疯狂放缩', w: 'elegant' },
                { l: 'C', c: '复平面画圆！这就是个动点到定点距离的问题，看图说话', w: 'visual' },
                { l: 'D', c: '把几个极角的边界值代进去算一下，哪个大选哪个', w: 'intuition' }
            ]
        },
        {
            t: '排列组合题，限制条件多到离谱（甲不站两头，乙丙必须相邻，丁不穿红衣服）：',
            opts: [
                { l: 'A', c: '分类讨论！第一类...第二类...穷举法才是最稳的', w: 'brute' },
                { l: 'B', c: '树状图画起来，一条路一条路数过去，绝不漏掉一个', w: 'visual' },
                { l: 'C', c: '捆绑法、插空法、容斥原理，各种公式套得飞起', w: 'elegant' },
                { l: 'D', c: '凭感觉排除几个明显不对的选项，然后在剩下两个里蒙一个', w: 'intuition' }
            ]
        },
        {
            t: '椭圆外面一点向椭圆引两条切线：',
            opts: [
                { l: 'A', c: '联立直线和椭圆，令判别式 $\\Delta=0$ 硬解', w: 'brute' },
                { l: 'B', c: '直接默写切点弦方程（极点极线），一步到位装个大的', w: 'elegant' },
                { l: 'C', c: '仿射变换！把椭圆拉成圆，世界瞬间变得简单明了', w: 'visual' },
                { l: 'D', c: '拿带有刻度的三角板在卷子上比划一下斜率大概是多少', w: 'intuition' }
            ]
        },
        {
            t: '找抽象方程的零点个数，式子长得爹妈不认：',
            opts: [
                { l: 'A', c: '参变分离！把 $a$ 孤立出来，看一条横线切函数图像几下', w: 'visual' },
                { l: 'B', c: '疯狂求导，一阶不够求二阶，列出严格的单调区间表格', w: 'brute' },
                { l: 'C', c: '把几个特殊值（0, 1, e）代进去看正负号，有变号就有零点', w: 'intuition' },
                { l: 'D', c: '利用零点存在性定理结合函数的奇偶性/周期性进行严密推理', w: 'elegant' }
            ]
        },
        {
            t: '解三角形遇到一堆向量点乘，还夹杂着边长：',
            opts: [
                { l: 'A', c: '利用数量积定义，化为纯粹的边角关系再用余弦定理', w: 'elegant' },
                { l: 'B', c: '全部坐标化！建系之后就是无情的代数方程', w: 'brute' },
                { l: 'C', c: '投影走起，把边投影到另一条边上，几何意义最直观', w: 'visual' },
                { l: 'D', c: '猜它是个等腰直角或者等边三角形，直接把特殊角往里套', w: 'intuition' }
            ]
        },
        {
            t: '异面直线求距离，那根线在长方体里长得极其扭曲：',
            opts: [
                { l: 'A', c: '建系！写出法向量，用向量投影公式算，不需要脑子', w: 'brute' },
                { l: 'B', c: '疯狂作辅助线，找平行平面，还原真实的几何距离', w: 'visual' },
                { l: 'C', c: '在脑子里把其中一条线平移，想象它们相交或者投影的样子', w: 'intuition' },
                { l: 'D', c: '利用等体积法（三棱锥体积换底），纯代数式优雅置换', w: 'elegant' }
            ]
        },
        {
            t: '看到递推数列求和，项数 $n$ 趋向于无穷大：',
            opts: [
                { l: 'A', c: '把前 $n$ 项和求出来，然后用极限思维严谨收敛', w: 'brute' },
                { l: 'B', c: '看看项数衰减的速度，如果是几何级数直接套求和公式', w: 'intuition' },
                { l: 'C', c: '画出数列的散点图，看出它逼近哪条水平渐近线', w: 'visual' },
                { l: 'D', c: '极致放缩法！找两个容易求和的数列把它夹在中间，用夹逼定理硬生生挤出极限', w: 'elegant' }
            ]
        },
        {
            t: '求动点轨迹方程，题干绕来绕去说了三行废话：',
            opts: [
                { l: 'A', c: '设动点为 $(x,y)$，把废话全翻译成代数等式，然后化简', w: 'brute' },
                { l: 'B', c: '敏锐察觉到这是圆锥曲线的第二定义，直接写出标准方程', w: 'elegant' },
                { l: 'C', c: '描几个特殊点，连起来看看像什么图形，再倒推方程', w: 'visual' },
                { l: 'D', c: '蒙一个圆或者椭圆的方程，把题干里的已知点代进去验证', w: 'intuition' }
            ]
        },
        {
            t: '离收卷还有5分钟，压轴题最后一问，你发现时间不够了：',
            opts: [
                { l: 'A', c: '挑简单的步骤写！把能拿的步骤分全拿到手，绝不恋战', w: 'brute' },
                { l: 'B', c: '“开遮！”洛必达、泰勒齐上阵，管它超不超纲，糊弄上去再说', w: 'intuition' },
                { l: 'C', c: '利用几何直观在卷子上画个极其标准的图，写个“由图可知”', w: 'visual' },
                { l: 'D', c: '写上“易证”、“同理可得”，企图用气势蒙蔽阅卷老师的双眼', w: 'elegant' }
            ]
        }
    ];

    let current = 0;
    let scores = { brute: 0, elegant: 0, visual: 0, intuition: 0 };

    function init() {
        const dots = document.getElementById('progress-dots');
        dots.innerHTML = '';
        for(let i=0; i<questions.length; i++) {
            dots.innerHTML += `<div class="progress-dot ${i===0?'active':''}" id="dot-${i}"></div>`;
        }
        renderQ();
    }

    function renderQ() {
        const q = questions[current];
        let html = `
            <div>
                <span class="q-number">${(current+1).toString().padStart(2, '0')}</span>
                <span style="font-size: 0.9rem; color: #94a3b8;">/ 20</span>
            </div>
            <div class="q-text">${q.t}</div>
        `;
        
        let shuffledOpts = [...q.opts].sort(() => Math.random() - 0.5);
        const letters = ['A','B','C','D'];
        shuffledOpts.forEach((o, i) => { o.l = letters[i]; });

        shuffledOpts.forEach(o => {
            html += `
                <div class="option" onclick="answer('${o.w}', this)">
                    <div class="option-letter">${o.l}</div>
                    <div class="option-content">${o.c}</div>
                </div>
            `;
        });
        
        const card = document.getElementById('q-card');
        card.innerHTML = html;
        
        renderMathInElement(card, {
            delimiters: [ {left: '$', right: '$', display: false} ],
            throwOnError: false
        });

        document.querySelectorAll('.progress-dot').forEach((d, i) => {
            d.className = `progress-dot ${i <= current ? 'active' : ''}`;
        });
    }

    function answer(weight, element) {
        element.style.borderColor = "#3b82f6";
        element.style.backgroundColor = "#e0e7ff";
        
        scores[weight]++;
        current++;
        
        setTimeout(() => {
            if (current < questions.length) {
                renderQ();
            } else {
                showResult();
            }
        }, 200);
    }

    function showResult() {
        document.getElementById('quiz-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        
        const top = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        
        const personas = {
            brute: {
                t: '无情推土机 🚜',
                d: '你就是考场上的西西弗斯！你极其讨厌花里胡哨的技巧，坚信“算力就是真理”。只要大方向没错，哪怕草稿纸算满三页你也不带虚的。韦达定理、暴风建系是你最忠实的伙伴，主打一个“硬刚到底，看谁先绷不住”。'
            },
            elegant: {
                t: '同构仙人 🧚‍♂️',
                d: '你对数学有一种近乎偏执的洁癖。极度厌恶脏活累活，看到不对称的式子浑身难受。做你的卷子就像看艺术品，别人在流汗狂算，你在找“同构”、“极点极线”和“放缩夹逼”，主打一个高维视角的降维打击。'
            },
            visual: {
                t: '高维眼位大师 👁️',
                d: '你的脑子里大概装了个显卡。万物皆可几何化，别人满眼都是恶心的 $x$ 和 $y$，你看到的全是圆、切线和法向量。遇到不会的题先画个图，只要图画得够准，答案自己就会浮现出来。'
            },
            intuition: {
                t: '考场特值赌徒 🎲',
                d: '你的直觉敏锐得可怕！遇事不决先代个特值，选择填空题基本靠“看一眼就觉得是这个”。做大题胆子大路子野，洛必达、泰勒展开等各种“禁术”开遮张手就来，极其擅长无中生有。'
            }
        };

        document.getElementById('persona-title').innerText = personas[top].t;
        document.getElementById('persona-desc').innerHTML = personas[top].d;
        
        renderMathInElement(document.getElementById('persona-desc'), {
            delimiters: [ {left: '$', right: '$', display: false} ]
        });

        drawRadar();
    }

    function drawRadar() {
        const box = document.getElementById('radar-chart');
        const vals = [scores.brute, scores.elegant, scores.visual, scores.intuition];
        const max = Math.max(...vals) + 2; 
        
        const points = vals.map((v, i) => {
            const r = (v / max) * 45; 
            const angle = i * (Math.PI / 2) - (Math.PI / 4); 
            return `${50 + r * Math.cos(angle)},${50 + r * Math.sin(angle)}`;
        }).join(' ');

        box.innerHTML = `
            <svg viewBox="0 0 100 100" style="overflow: visible;">
                <polygon points="50,5 95,50 50,95 5,50" fill="none" stroke="#cbd5e1" stroke-width="1"/>
                <polygon points="50,27.5 72.5,50 50,72.5 27.5,50" fill="none" stroke="#cbd5e1" stroke-width="1"/>
                <line x1="50" y1="5" x2="50" y2="95" stroke="#cbd5e1" stroke-width="1"/>
                <line x1="5" y1="50" x2="95" y2="50" stroke="#cbd5e1" stroke-width="1"/>
                
                <polygon points="${points}" fill="rgba(59, 130, 246, 0.2)" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
                
                <text x="50" y="-2" font-size="6" font-weight="bold" text-anchor="middle" fill="#475569">爆算</text>
                <text x="102" y="52" font-size="6" font-weight="bold" text-anchor="start" fill="#475569">构造</text>
                <text x="50" y="102" font-size="6" font-weight="bold" text-anchor="middle" fill="#475569">画图</text>
                <text x="-2" y="52" font-size="6" font-weight="bold" text-anchor="end" fill="#475569">直觉</text>
            </svg>
        `;
    }

    window.addEventListener('load', init);
</script>
</body>
</html>
